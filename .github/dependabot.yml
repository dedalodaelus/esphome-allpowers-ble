version: 2

updates:
  - package-ecosystem: pip
    directory: /
    target-branch: devel
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Madrid
    open-pull-requests-limit: 5
    groups:
      lint-tools:
        patterns:
          - clang-format
          - cpplint
          - flake8
          - pylint
          - ruff
          - yamllint
    commit-message:
      prefix: "ci(deps)"

  - package-ecosystem: github-actions
    directory: /
    target-branch: devel
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: Europe/Madrid
    open-pull-requests-limit: 3
    groups:
      github-actions:
        patterns:
          - "*"
    commit-message:
      prefix: "ci(actions)"
