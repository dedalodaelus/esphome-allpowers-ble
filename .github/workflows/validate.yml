name: Build and Code Quality

on:
  push:
    branches:
      - main
      - devel
  pull_request:
    branches:
      - main
      - devel
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validation:
    name: Complete validation
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements-lint.txt
            requirements-ci.txt

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: >-
            platformio-${{ runner.os }}-
            ${{ hashFiles('requirements-ci.txt', 'scripts/validate.sh') }}
          restore-keys: |
            platformio-${{ runner.os }}-

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            -r requirements-lint.txt \
            -r requirements-ci.txt

      - name: Run complete validation
        run: ./scripts/validate.sh

  ci-success:
    name: CI passed
    if: always()
    needs:
      - validation
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Verify required jobs
        env:
          VALIDATION_RESULT: ${{ needs.validation.result }}
        run: |
          test "$VALIDATION_RESULT" = "success"
