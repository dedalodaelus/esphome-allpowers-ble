name: Build and Code Quality

on:
  push:
    branches:
      - main
      - devel
  pull_request:
    branches:
      - main
      - devel
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validation:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 75

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Code quality
            mode: code-quality
            cache_deps: requirements-lint.txt
          - name: Build ESP32 (ESP-IDF)
            mode: build-target
            target: esp32-idf
            cache_deps: requirements-ci.txt
          - name: Build ESP32-S3 (ESP-IDF)
            mode: build-target
            target: esp32s3-idf
            cache_deps: requirements-ci.txt
          - name: Build ESP32 (Arduino)
            mode: build-target
            target: esp32-arduino
            cache_deps: requirements-ci.txt
          - name: Build ESP32 dual station (ESP-IDF)
            mode: build-target
            target: esp32-multi-idf
            cache_deps: requirements-ci.txt

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ${{ matrix.cache_deps }}

      - name: Cache PlatformIO
        if: matrix.mode == 'build-target'
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: >-
            platformio-${{ runner.os }}-${{ matrix.target }}-
            ${{ hashFiles('requirements-ci.txt', 'scripts/validate.sh', 'tests/ci.yaml', 'tests/ci-multi.yaml', 'tests/ci-base.yaml') }}
          restore-keys: |
            platformio-${{ runner.os }}-${{ matrix.target }}-
            platformio-${{ runner.os }}-

      - name: Install code-quality dependencies
        if: matrix.mode == 'code-quality'
        run: |
          python -m pip install --upgrade pip
          pip install \
            -r requirements-lint.txt \
            -r requirements-ci.txt

      - name: Install build dependencies
        if: matrix.mode == 'build-target'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Run matrix validation target
        run: ./scripts/validate.sh ${{ matrix.mode }} ${{ matrix.target || '' }}

  ci-success:
    name: CI passed
    if: always()
    needs:
      - validation
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Verify required jobs
        env:
          VALIDATION_RESULT: ${{ needs.validation.result }}
        run: |
          test "$VALIDATION_RESULT" = "success"
