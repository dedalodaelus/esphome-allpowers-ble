name: Build and Code Quality

on:
  push:
    branches:
      - main
      - devel
  pull_request:
    branches:
      - main
      - devel
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Code quality
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements-lint.txt
            requirements-ci.txt

      - name: Install quality dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            -r requirements-lint.txt \
            -r requirements-ci.txt

      - name: Check Python syntax
        run: python -m compileall -q components tests

      - name: Ruff lint
        run: ruff check components tests

      - name: Ruff format
        run: ruff format --check components tests

      - name: Flake8
        run: flake8 components tests

      - name: Pylint
        run: pylint components/allpowers_ble tests/test_protocol.py

      - name: ClangFormat
        run: |
          clang-format --dry-run --Werror \
            components/allpowers_ble/allpowers_ble.h \
            components/allpowers_ble/allpowers_ble.cpp

      - name: CppLint
        run: |
          cpplint \
            components/allpowers_ble/allpowers_ble.h \
            components/allpowers_ble/allpowers_ble.cpp

      - name: YAML lint
        run: |
          yamllint \
            .github/workflows \
            packages \
            examples \
            tests/ci.yaml \
            home_assistant/allpowers_ble_controls.yaml.example

      - name: Protocol regression tests
        run: python tests/test_protocol.py

  build:
    name: Build ${{ matrix.name }}
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ESP32
            board: esp32dev
            device_name: allpowers-ble-ci-esp32

          - name: ESP32-S3
            board: esp32-s3-devkitc-1
            device_name: allpowers-ble-ci-esp32-s3

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: >-
            platformio-${{ runner.os }}-${{ matrix.board }}-
            ${{ hashFiles('requirements-ci.txt') }}
          restore-keys: |
            platformio-${{ runner.os }}-${{ matrix.board }}-
            platformio-${{ runner.os }}-

      - name: Install ESPHome
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Compile test firmware
        run: |
          esphome \
            -s test_board "${{ matrix.board }}" \
            -s test_device_name "${{ matrix.device_name }}" \
            compile tests/ci.yaml

  ci-success:
    name: CI passed
    if: always()
    needs:
      - quality
      - build
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Verify required jobs
        env:
          QUALITY_RESULT: ${{ needs.quality.result }}
          BUILD_RESULT: ${{ needs.build.result }}
        run: |
          test "$QUALITY_RESULT" = "success"
          test "$BUILD_RESULT" = "success"
