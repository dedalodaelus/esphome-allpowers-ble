name: Build and Code Quality

on:
  push:
    branches:
      - main
      - devel
  pull_request:
    branches:
      - main
      - devel
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Code quality
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements-lint.txt
            requirements-ci.txt

      - name: Install code-quality dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            -r requirements-lint.txt \
            -r requirements-ci.txt

      - name: Run code-quality checks
        run: bash ./scripts/validate.sh code-quality

  build:
    name: Build ${{ matrix.name }}
    # needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 75

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ESP32
            target: esp32-idf
          - name: ESP32-S3
            target: esp32s3-idf
          - name: ESP32 (Arduino)
            target: esp32-arduino
          - name: ESP32 dual station (ESP-IDF)
            target: esp32-multi-idf

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Cache PlatformIO
        uses: actions/cache@v6
        with:
          path: ~/.platformio
          key: >-
            platformio-${{ runner.os }}-${{ matrix.target }}-
            ${{ hashFiles('requirements-ci.txt', 'scripts/validate.sh', 'tests/ci.yaml', 'tests/ci-multi.yaml', 'tests/ci-base.yaml') }}
          restore-keys: |
            platformio-${{ runner.os }}-${{ matrix.target }}-
            platformio-${{ runner.os }}-

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Run firmware build target
        run: bash ./scripts/validate.sh build-target ${{ matrix.target }}

  ci-success:
    name: CI passed
    if: always()
    needs:
      - quality
      - build
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Verify required jobs
        env:
          QUALITY_RESULT: ${{ needs.quality.result }}
          BUILD_RESULT: ${{ needs.build.result }}
        run: |
          test "$QUALITY_RESULT" = "success"
          test "$BUILD_RESULT" = "success"
