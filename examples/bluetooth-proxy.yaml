substitutions:
  node_name: allpowers-ble-proxy
  node_friendly_name: ALLPOWERS BLE Proxy

esphome:
  name: ${node_name}
  friendly_name: ${node_friendly_name}

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

# One connection slot for the power station and three for Home Assistant.
esp32_ble:
  max_connections: 4

bluetooth_proxy:
  active: true
  connection_slots: 3

logger:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

external_components:
  # Loads the custom Python/C++ platform from the repository branch below.
  - source: github://dedalodaelus/esphome-allpowers-ble@main
    components:
      - allpowers_ble

packages:
  # The package shares the scanner with Bluetooth Proxy. The explicit BLE slot
  # allocation above reserves one connection for the power station.
  allpowers_station:
    url: https://github.com/dedalodaelus/esphome-allpowers-ble
    ref: main
    refresh: 1d
    files:
      - path: packages/allpowers_ble.yaml
        vars:
          allpowers_name: "ALLPOWERS Power Station"
          allpowers_mac: !secret allpowers_station_mac
