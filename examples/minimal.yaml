substitutions:
  node_name: allpowers-ble-bridge
  node_friendly_name: ALLPOWERS BLE Bridge

esphome:
  name: ${node_name}
  friendly_name: ${node_friendly_name}

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "ALLPOWERS BLE Fallback"
    password: !secret fallback_ap_password

captive_portal:


external_components:
  # Loads the custom Python/C++ platform from the repository branch below.
  - source:
      type: git
      url: https://github.com/dedalodaelus/esphome-allpowers-ble
      ref: main
    refresh: 1d
    components:
      - allpowers_ble


packages:
  # Loads the reusable entities and connection policy. Keep this ref aligned
  # with external_components so code and package schemas always match.
  allpowers_station:
    url: https://github.com/dedalodaelus/esphome-allpowers-ble
    ref: main
    refresh: 1d
    files:
      - path: packages/allpowers_ble.yaml
        vars:
          allpowers_id: allpowers
          allpowers_name: "ALLPOWERS Power Station"
          allpowers_mac: !secret allpowers_station_mac
          allpowers_service_uuid: "FFF0"
          allpowers_stale_timeout: 30s
          allpowers_connect_at_boot: "true"
          allpowers_bootstrap_delay: 10s
          allpowers_scan_interval: 320ms
          allpowers_scan_window: 320ms
          allpowers_scan_active: "true"
          allpowers_rssi_update_interval: 60s
