# Reusable ESPHome package for ALLPOWERS power stations that implement the
# FFF0/FFF1/FFF2 BLE protocol used by the upstream allpowers-ble project.
#
# Compatibility is protocol-based. This package does not imply support for
# every ALLPOWERS product.

defaults:
  # Identity and protocol parameters normally changed by users.
  allpowers_id: allpowers
  allpowers_name: "ALLPOWERS Power Station"
  # No default is provided intentionally. Every package instance must explicitly
  # pass the BLE MAC address through allpowers_mac.
  # allpowers_mac: "AA:BB:CC:DD:EE:FF"
  allpowers_service_uuid: "FFF0"
  allpowers_stale_timeout: 30s
  # Connection health: ask the station to resume status broadcasts every 20s,
  # then recycle a GATT link that yields no valid packet for 45s. The watchdog
  # must be longer than the keepalive interval.
  allpowers_keepalive_interval: 20s
  allpowers_watchdog_timeout: 45s
  # Experimental workaround for R600 firmware that may close GATT after about
  # 10 minutes even while status traffic continues. When enabled, resend the
  # last settings snapshot every 9 minutes. Accepted settings writes may make
  # the station beep, so this remains opt-in.
  allpowers_enable_settings_keepalive: "false"
  allpowers_settings_keepalive_interval: 9min
  # Command 0x35 was found in the official app but is only enabled there for
  # SOLIX/VOLIX P1800. Leave false unless the exact station is being tested.
  allpowers_enable_experimental_device_name: "false"

  # Connection policy. The package deliberately controls auto-connect at
  # runtime so the Home Assistant switch can fully stop discovery/retries.
  allpowers_connect_at_boot: "true"
  allpowers_bootstrap_delay: 10s
  # Keep the client idle briefly so an active-scan response can provide the
  # advertised name before the same advertisement starts a GATT connection.
  allpowers_advertised_name_wait_timeout: 3s

  # Shared BLE scanner tuning. These values provide continuous scanning and
  # are compatible with a node that also acts as a Bluetooth Proxy.
  allpowers_scan_interval: 320ms
  allpowers_scan_window: 320ms
  allpowers_scan_active: "true"
  allpowers_rssi_update_interval: 60s

esphome:
  min_version: 2026.7.0

  # Expose the power station as a separate logical device in Home Assistant.
  devices:
    - id: ${allpowers_id}_device
      name: "${allpowers_name}"

  on_boot:
    priority: -100
    then:
      # Publish the requested policy immediately; physical connection state is
      # reported independently by the BLE Connected binary sensor.
      - lambda: |-
          id(${allpowers_id}_ble_connection_control).publish_state(
              id(${allpowers_id}_ble_connection_requested));
      - text_sensor.template.publish:
          id: ${allpowers_id}_ble_connection_state
          state: !lambda |-
            if (id(${allpowers_id}_ble_connection_requested)) {
              return std::string("Searching");
            }
            return std::string("Disabled");

      - if:
          condition:
            lambda: |-
              return id(${allpowers_id}_ble_connection_requested);
          then:
            # Delay BLE connection attempts until the node and scanner have
            # completed startup. Recheck the requested state after the delay
            # so an early OFF command is respected.
            - delay: ${allpowers_bootstrap_delay}
            - if:
                condition:
                  lambda: |-
                    return id(${allpowers_id}_ble_connection_requested);
                then:
                  - logger.log: "Enabling persistent BLE connection to ${allpowers_name}"
                  - script.execute: ${allpowers_id}_prepare_ble_connection
          else:
            - script.stop: ${allpowers_id}_prepare_ble_connection
            - lambda: |-
                id(${allpowers_id}_advertised_name_capture_pending) = false;
                id(${allpowers_id}_ble_client).set_auto_connect(false);
                id(${allpowers_id}_ble_client).set_enabled(false);

globals:
  # Desired connection state, not the current physical BLE link state.
  # ON: scan/retry continuously and reconnect after link loss.
  # OFF: disconnect and ignore advertisements for this BLE client.
  - id: ${allpowers_id}_ble_connection_requested
    type: bool
    restore_value: false
    initial_value: '${allpowers_connect_at_boot}'

  # Per-connection advertisement gate. The bounded timeout prevents a station
  # that omits its local name from blocking the BLE connection indefinitely.
  - id: ${allpowers_id}_advertised_name_captured
    type: bool
    restore_value: false
    initial_value: "false"

  - id: ${allpowers_id}_advertised_name_capture_pending
    type: bool
    restore_value: false
    initial_value: "false"

script:
  - id: ${allpowers_id}_prepare_ble_connection
    mode: restart
    then:
      # Prevent BLEClient from claiming the first matching advertisement while
      # the tracker waits for a possible active-scan response containing the
      # complete local name. Scanning itself remains active.
      - lambda: |-
          id(${allpowers_id}_advertised_name_capture_pending) = true;
          id(${allpowers_id}_ble_client).set_auto_connect(false);
      - if:
          condition:
            lambda: |-
              return !id(${allpowers_id}_advertised_name_captured);
          then:
            - delay: ${allpowers_advertised_name_wait_timeout}
      - lambda: |-
          id(${allpowers_id}_advertised_name_capture_pending) = false;
          if (!id(${allpowers_id}_ble_connection_requested)) {
            return;
          }
          id(${allpowers_id}_ble_client).set_auto_connect(true);
          id(${allpowers_id}_ble_client).set_enabled(true);

esp32_ble_tracker:
  scan_parameters:
    interval: ${allpowers_scan_interval}
    window: ${allpowers_scan_window}
    active: ${allpowers_scan_active}
  # Capture the name passively from advertisements. This remains available on
  # stations where the experimental command-0x35 rename path is not enabled.
  on_ble_advertise:
    - mac_address: ${allpowers_mac}
      then:
        - lambda: |-
            if (id(${allpowers_id}).update_station_name(x.get_name(), "BLE advertisement")) {
              id(${allpowers_id}_advertised_name_captured) = true;
              if (id(${allpowers_id}_advertised_name_capture_pending) &&
                  id(${allpowers_id}_ble_connection_requested)) {
                id(${allpowers_id}_prepare_ble_connection).execute();
              }
            }

ble_client:
  - id: ${allpowers_id}_ble_client
    mac_address: ${allpowers_mac}
    # Kept false in static configuration. The template switch below enables
    # or disables both the client and auto-connect dynamically.
    auto_connect: false

    on_connect:
      then:
        - logger.log: "${allpowers_name} connected over BLE"
        - text_sensor.template.publish:
            id: ${allpowers_id}_ble_connection_state
            state: "Connected"

    on_disconnect:
      then:
        - if:
            condition:
              lambda: |-
                return id(${allpowers_id}_ble_connection_requested);
            then:
              - logger.log: "${allpowers_name} disconnected; searching again"
              - text_sensor.template.publish:
                  id: ${allpowers_id}_ble_connection_state
                  state: "Searching"
              - lambda: |-
                  id(${allpowers_id}_advertised_name_captured) = false;
              - script.execute: ${allpowers_id}_prepare_ble_connection
            else:
              - logger.log: "${allpowers_name} disconnected; BLE connection disabled"
              - text_sensor.template.publish:
                  id: ${allpowers_id}_ble_connection_state
                  state: "Disabled"

allpowers_ble:
  # Protocol parser/controller attached to the generic ESPHome BLE client.
  - id: ${allpowers_id}
    ble_client_id: ${allpowers_id}_ble_client
    service_uuid: ${allpowers_service_uuid}
    stale_timeout: ${allpowers_stale_timeout}
    keepalive_interval: ${allpowers_keepalive_interval}
    watchdog_timeout: ${allpowers_watchdog_timeout}
    enable_settings_keepalive: ${allpowers_enable_settings_keepalive}
    settings_keepalive_interval: ${allpowers_settings_keepalive_interval}
    enable_experimental_device_name: ${allpowers_enable_experimental_device_name}

sensor:
  # Stable telemetry decoded directly from verified status-frame offsets.
  - platform: allpowers_ble
    allpowers_ble_id: ${allpowers_id}

    state_of_charge:
      id: ${allpowers_id}_state_of_charge
      name: "Battery Level"
      device_id: ${allpowers_id}_device

    input_power:
      id: ${allpowers_id}_input_power
      name: "Input Power"
      device_id: ${allpowers_id}_device

    output_power:
      id: ${allpowers_id}_output_power
      name: "Output Power"
      device_id: ${allpowers_id}_device

    remaining_time:
      id: ${allpowers_id}_remaining_time
      name: "Estimated Time Remaining"
      device_id: ${allpowers_id}_device

    ac_frequency:
      id: ${allpowers_id}_ac_frequency
      name: "AC Frequency (Experimental)"
      device_id: ${allpowers_id}_device
      entity_category: diagnostic
      disabled_by_default: true

    # Raw protocol diagnostics are useful for reverse engineering and support,
    # but are hidden by default for normal users.
    status_byte:
      id: ${allpowers_id}_status_byte
      name: "BLE Status Byte"
      device_id: ${allpowers_id}_device
      entity_category: diagnostic
      disabled_by_default: true

    packet_length:
      id: ${allpowers_id}_packet_length
      name: "BLE Packet Length"
      device_id: ${allpowers_id}_device
      entity_category: diagnostic
      disabled_by_default: true

    protocol_error_count:
      id: ${allpowers_id}_protocol_error_count
      name: "BLE Protocol Error Count"
      device_id: ${allpowers_id}_device
      disabled_by_default: true

    consecutive_protocol_errors:
      id: ${allpowers_id}_consecutive_protocol_errors
      name: "Consecutive BLE Protocol Errors"
      device_id: ${allpowers_id}_device
      disabled_by_default: true

    last_protocol_error_uptime:
      id: ${allpowers_id}_last_protocol_error_uptime
      name: "Last BLE Protocol Error Uptime"
      device_id: ${allpowers_id}_device
      disabled_by_default: true

  - platform: ble_client
    type: rssi
    ble_client_id: ${allpowers_id}_ble_client
    id: ${allpowers_id}_ble_rssi
    name: "BLE Signal Strength"
    device_id: ${allpowers_id}_device
    entity_category: diagnostic
    disabled_by_default: true
    update_interval: ${allpowers_rssi_update_interval}

binary_sensor:
  - platform: allpowers_ble
    allpowers_ble_id: ${allpowers_id}

    connected:
      id: ${allpowers_id}_connected
      name: "BLE Connected"
      device_id: ${allpowers_id}_device
      entity_category: diagnostic

    # These states intentionally describe different readiness levels:
    # connected -> BLE link open; data_valid -> fresh status received;
    # controls_available -> a safe combined output command can be written.
    data_valid:
      id: ${allpowers_id}_data_valid
      name: "Telemetry Available"
      device_id: ${allpowers_id}_device
      entity_category: diagnostic

    controls_available:
      id: ${allpowers_id}_controls_available
      name: "Controls Available"
      device_id: ${allpowers_id}_device
      entity_category: diagnostic

    # ECO uses a different command family from the output switches. It becomes
    # writable only after a fresh settings notification has established every
    # field that the combined settings command must preserve.
    settings_available:
      id: ${allpowers_id}_settings_available
      name: "Settings Available"
      device_id: ${allpowers_id}_device
      entity_category: diagnostic

    ac_output:
      id: ${allpowers_id}_ac_output_active
      name: "AC Output Status"
      device_id: ${allpowers_id}_device

    dc_output:
      id: ${allpowers_id}_dc_output_active
      name: "DC Output Status"
      device_id: ${allpowers_id}_device

    eco_mode:
      id: ${allpowers_id}_eco_mode_active
      name: "ECO Mode Status"
      device_id: ${allpowers_id}_device
      icon: mdi:leaf

    light:
      id: ${allpowers_id}_light_active
      name: "Light Status"
      device_id: ${allpowers_id}_device

    charging:
      id: ${allpowers_id}_charging
      name: "Battery Charging"
      device_id: ${allpowers_id}_device

    discharging:
      id: ${allpowers_id}_discharging
      name: "Battery Discharging"
      device_id: ${allpowers_id}_device

    protocol_error:
      id: ${allpowers_id}_protocol_error
      name: "BLE Protocol Error"
      device_id: ${allpowers_id}_device
      disabled_by_default: true
      entity_category: diagnostic

text_sensor:
  # Desired-policy summary for humans. It is not a fourth source of truth:
  # Disabled means retries are disabled, Searching means enabled but not
  # connected, and Connected is set by the BLE client's on_connect callback.
  - platform: template
    id: ${allpowers_id}_ble_connection_state
    name: "BLE Connection Status"
    device_id: ${allpowers_id}_device
    icon: mdi:bluetooth-connect
    entity_category: diagnostic
    update_interval: never

  # Reported by the power station in command 0x03. These are not the ESPHome
  # or ESP32 firmware versions of the BLE gateway.
  - platform: allpowers_ble
    allpowers_ble_id: ${allpowers_id}
    # Unified read-only name. Valid values received from either an advertisement
    # or command 0x35 are persisted and restored only for this station's MAC.
    station_name:
      id: ${allpowers_id}_ble_advertised_name
      name: "Device Name"
      device_id: ${allpowers_id}_device
      entity_category: diagnostic

    hardware_version:
      id: ${allpowers_id}_hardware_version
      name: "Hardware Version"
      device_id: ${allpowers_id}_device

    firmware_version:
      id: ${allpowers_id}_firmware_version
      name: "Firmware Version"
      device_id: ${allpowers_id}_device

    last_protocol_error:
      id: ${allpowers_id}_last_protocol_error
      name: "Last BLE Protocol Error"
      device_id: ${allpowers_id}_device
      disabled_by_default: true

text:
  - platform: allpowers_ble
    allpowers_ble_id: ${allpowers_id}

    # Non-optimistic: the displayed value changes only after a valid command-
    # 0x35 response. The parent rejects writes while the opt-in above is false.
    device_name:
      id: ${allpowers_id}_device_name
      name: "Set Bluetooth Name (Experimental)"
      device_id: ${allpowers_id}_device
      disabled_by_default: true

select:
  - platform: allpowers_ble
    allpowers_ble_id: ${allpowers_id}

    # The station stores this value in the same combined settings frame as ECO
    # mode. The component preserves every unrelated setting when it changes.
    eco_shutdown_time:
      id: ${allpowers_id}_eco_shutdown_time
      name: "ECO Shutdown Time"
      device_id: ${allpowers_id}_device

    # Work mode uses bits 1-2 of the same settings bitmap. The component keeps
    # every unrelated bit and the ECO timeout unchanged when this value changes.
    work_mode:
      id: ${allpowers_id}_work_mode
      name: "Work Mode"
      device_id: ${allpowers_id}_device
      icon: mdi:speedometer

switch:
  # Desired-state control:
  # ON  -> actively search until connected and reconnect after link loss.
  # OFF -> disconnect and stop trying to connect to this power station.
  - platform: template
    id: ${allpowers_id}_ble_connection_control
    name: "Keep BLE Connected"
    device_id: ${allpowers_id}_device
    icon: mdi:bluetooth-connect
    entity_category: config
    optimistic: false
    restore_mode: DISABLED
    lambda: |-
      return id(${allpowers_id}_ble_connection_requested);

    turn_on_action:
      - logger.log: "Enabling persistent BLE connection to ${allpowers_name}"
      - text_sensor.template.publish:
          id: ${allpowers_id}_ble_connection_state
          state: "Searching"
      - lambda: |-
          id(${allpowers_id}_ble_connection_requested) = true;
          id(${allpowers_id}_advertised_name_captured) = false;
          id(${allpowers_id}_ble_connection_control).publish_state(true);
      - script.execute: ${allpowers_id}_prepare_ble_connection

    turn_off_action:
      - logger.log: "Disabling BLE connection to ${allpowers_name}"
      - text_sensor.template.publish:
          id: ${allpowers_id}_ble_connection_state
          state: "Disabled"
      - script.stop: ${allpowers_id}_prepare_ble_connection
      - lambda: |-
          id(${allpowers_id}_ble_connection_requested) = false;
          id(${allpowers_id}_advertised_name_capture_pending) = false;
          id(${allpowers_id}_ble_client).set_auto_connect(false);
          id(${allpowers_id}_ble_client).set_enabled(false);
          id(${allpowers_id}_ble_connection_control).publish_state(false);

  - platform: allpowers_ble
    allpowers_ble_id: ${allpowers_id}

    # Experimental R600 inactivity workaround. Its last state is restored from
    # flash at boot and remains unchanged across BLE disconnects.
    settings_keepalive:
      id: ${allpowers_id}_keepalive
      name: "Enable Keepalive"
      device_id: ${allpowers_id}_device
      icon: mdi:timer-sync-outline

    ac_output:
      id: ${allpowers_id}_ac_output
      name: "AC Output"
      device_id: ${allpowers_id}_device

    dc_output:
      id: ${allpowers_id}_dc_output
      name: "DC Output"
      device_id: ${allpowers_id}_device

    eco_mode:
      id: ${allpowers_id}_eco_mode
      name: "ECO Mode"
      device_id: ${allpowers_id}_device
      icon: mdi:leaf

    # This is the independent 12 V automotive socket reported in the settings
    # bitmap, not the DC/USB group controlled by the status command.
    car_charger:
      id: ${allpowers_id}_car_charger
      name: "Car Charger"
      device_id: ${allpowers_id}_device
      icon: mdi:car-battery
      disabled_by_default: true

    light:
      id: ${allpowers_id}_light
      name: "Light"
      device_id: ${allpowers_id}_device

number:
  - platform: allpowers_ble
    allpowers_ble_id: ${allpowers_id}

    # Whole minutes below the observed ten-minute R600 cutoff. The last value
    # selected in Home Assistant is restored from flash at boot.
    settings_keepalive_interval:
      id: ${allpowers_id}_settings_keepalive_interval
      name: "Keepalive Interval"
      device_id: ${allpowers_id}_device
      mode: box

button:
  - platform: allpowers_ble
    allpowers_ble_id: ${allpowers_id}

    # Sends the learned settings snapshot once, even when the periodic
    # keepalive switch is off. It is ignored until BLE is ready and command
    # 0x03 has supplied a snapshot in the current connection.
    send_settings_keepalive:
      id: ${allpowers_id}_send_settings_keepalive
      name: "Send Keepalive Now"
      device_id: ${allpowers_id}_device
      icon: mdi:timer-play-outline
