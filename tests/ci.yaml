packages:
  ci_base: !include ci-base.yaml

  # Exercise the public package and component together with a non-connecting
  # placeholder MAC; no physical BLE device is required for compilation.
  allpowers_station: !include
    file: ../packages/allpowers_ble.yaml
    vars:
      allpowers_id: allpowers
      allpowers_name: "ALLPOWERS Test Station"
      allpowers_mac: "AA:BB:CC:DD:EE:FF"
      allpowers_connect_at_boot: "false"
